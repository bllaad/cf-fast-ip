name: CF IP Geo Split

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Download source
      run: |
        curl -L https://zip.cm.edu.kg/all.txt -o all.txt

    - name: Build geo files
      run: |
        mkdir -p country
        > unknown.txt

        # 提取所有国家代码
        awk -F'#' '{print $1"#"$2}' all.txt | while IFS="#" read ip portcc; do

          ip=$(echo $ip | xargs)
          cc=$(echo $portcc | xargs)

          # 如果本身带国家码
          if [ -n "$cc" ]; then
            echo "$ip#$cc" >> country/$cc.txt
          else
            echo "$ip" >> unknown.txt
          fi

        done

    - name: Fix missing countries (fallback via API)
      run: |
        mkdir -p country

        for line in $(cat all.txt); do

          ip=$(echo $line | cut -d':' -f1)
          cc=$(echo $line | grep -o '#..$' | tr -d '#')

          if [ -z "$cc" ]; then

            result=$(curl -s "http://ip-api.com/json/$ip?fields=status,countryCode")

            code=$(echo $result | grep -o '"countryCode":"[^"]*"' | cut -d'"' -f4)

            if [ -n "$code" ]; then
              echo "$line" >> country/$code.txt
            else
              echo "$line" >> unknown.txt
            fi

          fi

        done

    - name: Normalize (max 10 per country)
      run: |
        for f in country/*.txt; do
          sort -u "$f" | head -n 10 > tmp && mv tmp "$f"
        done

        sort -u unknown.txt | head -n 10 > tmp && mv tmp unknown.txt

    - name: Keep fastest 100
      run: |
        grep -v '^$' all.txt | head -n 100 > result.txt

    - name: Commit
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add .
        git commit -m "geo split + fastest 100" || echo "no change"
        git push