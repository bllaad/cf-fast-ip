name: Update Fastest 100 CF Nodes

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Download source list
      run: |
        curl -L https://zip.cm.edu.kg/all.txt -o all.txt

    - name: Keep fastest 100 nodes
      run: |
        grep -v '^$' all.txt | head -n 100 > result.txt

    - name: Commit update
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add result.txt
        git commit -m "update fastest 100 cf nodes" || echo "no change"
        git push