<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>CF 节点控制台 PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:#fff;
}

header {
  padding:20px;
  background:#111827;
  font-size:20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

.card {
  background:#111827;
  padding:15px;
  border-radius:10px;
}

table {
  width:100%;
  border-collapse: collapse;
}

td,th {
  padding:8px;
  border-bottom:1px solid #1f2937;
}

.good {color:#22c55e;}
.mid {color:#facc15;}
.bad {color:#ef4444;}
</style>

</head>

<body>

<header>🚀 CF 节点控制台 PRO</header>

<div class="grid">

<div class="card">
<h3>⚡ 节点排行榜</h3>
<table id="table"></table>
</div>

<div class="card">
<h3>📊 状态统计</h3>
<div id="stats"></div>
</div>

</div>

<script>

async function load() {

const res = await fetch("https://你的worker域名.workers.dev");
const data = await res.json();

let html = "<tr><th>IP</th><th>延迟</th><th>国家</th></tr>";

let good=0, mid=0, bad=0;

data.forEach(d => {

if(d.latency < 80) good++;
else if(d.latency < 200) mid++;
else bad++;

html += `
<tr>
<td>${d.ip}</td>
<td class="${d.latency<80?'good':d.latency<200?'mid':'bad'}">
${d.latency}ms
</td>
<td>${d.cc}</td>
</tr>`;
});

document.getElementById("table").innerHTML = html;

document.getElementById("stats").innerHTML = `
🟢 快速: ${good}<br>
🟡 中等: ${mid}<br>
🔴 超时: ${bad}
`;

}

load();
setInterval(load, 10000);

</script>

</body>
</html>
